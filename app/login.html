<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — Ars Nova</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230d6efd'/><path d='M7 20l5-8 4 6 3-4 6 6' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../index.html">ARS NOVA</a>
    </div>
  </nav>

  <!-- CONTENIDO CENTRADO -->
  <div class="container my-auto py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-9 col-md-7 col-lg-5">

        <div class="card border-0 shadow-sm">
          <div class="card-body p-4 p-md-5">
            <h4 class="fw-bold text-center mb-1">Bienvenido</h4>
            <p class="text-center text-muted small mb-4">Ingresa a tu cuenta de Ars Nova</p>

            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="floatingEmail" placeholder="correo@ejemplo.com" />
              <label for="floatingEmail"><i class="bi bi-envelope me-1"></i>Correo electrónico</label>
            </div>

            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="floatingPassword" placeholder="Contraseña" />
              <label for="floatingPassword"><i class="bi bi-lock me-1"></i>Contraseña</label>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="recordarme" />
                <label class="form-check-label small" for="recordarme">Recordarme</label>
              </div>
              <a href="../app/recover.html" class="small text-muted text-decoration-none">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="button" class="btn btn-dark w-100 mb-3">Ingresar</button>

            <p class="text-center small text-muted mb-0">¿No tienes cuenta? <a href="../app/register.html" class="text-dark fw-bold text-decoration-none">Regístrate</a></p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-dark text-secondary text-center py-3 mt-auto">
    <small>&copy; 2026 Ars Nova Galería</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

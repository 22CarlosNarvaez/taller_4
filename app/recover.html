<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Contraseña — Ars Nova</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230d6efd'/><path d='M7 20l5-8 4 6 3-4 6 6' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../index.html">ARS NOVA</a>
    </div>
  </nav>

  <!-- CONTENIDO CENTRADO -->
  <div class="container my-auto py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-9 col-md-7 col-lg-5">

        <div class="card border-0 shadow-sm">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <i class="bi bi-shield-lock fs-1 text-dark"></i>
              <h4 class="fw-bold mt-2 mb-1">Recuperar contraseña</h4>
              <p class="text-muted small">Ingresa tu correo y te enviaremos un enlace de restablecimiento.</p>
            </div>

            <div class="mb-3">
              <label for="correoRecuperar" class="form-label small fw-semibold">Correo electrónico</label>
              <!-- is-invalid aplicado estáticamente para demostrar error de validación -->
              <input type="email" class="form-control is-invalid" id="correoRecuperar" value="usuario@ejemplo.com" />
              <div class="invalid-feedback">
                <i class="bi bi-exclamation-circle me-1"></i>Correo no encontrado. Verifica e intenta de nuevo.
              </div>
            </div>

            <button type="button" class="btn btn-dark w-100 mb-3 mt-2">Enviar enlace</button>

            <div class="text-center">
              <a href="login.html" class="small text-muted text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesión</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-dark text-secondary text-center py-3 mt-auto">
    <small>&copy; 2026 Ars Nova Galería</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

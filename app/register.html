<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro — Ars Nova</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230d6efd'/><path d='M7 20l5-8 4 6 3-4 6 6' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/index.html">ART NOVA</a>
    </div>
  </nav>

  <!-- CONTENIDO CENTRADO -->
  <div class="container my-auto py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-9 col-lg-7">

        <div class="card border-0 shadow-sm">
          <div class="card-body p-4 p-md-5">
            <h4 class="fw-bold text-center mb-1">Crear cuenta</h4>
            <p class="text-center text-muted small mb-4">Únete a la comunidad Ars Nova</p>

            <div class="row g-3">
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="text" class="form-control" id="nombre" placeholder="Nombre" />
                  <label for="nombre">Nombre</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="text" class="form-control" id="apellidos" placeholder="Apellidos" />
                  <label for="apellidos">Apellidos</label>
                </div>
              </div>
            </div>

            <div class="row g-3 mt-0">
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="email" class="form-control" id="correo" placeholder="Correo" />
                  <label for="correo">Correo electrónico</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="tel" class="form-control" id="telefono" placeholder="Teléfono" />
                  <label for="telefono">Teléfono</label>
                </div>
              </div>
            </div>

            <div class="row g-3 mt-0">
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="password" class="form-control" id="password" placeholder="Contraseña" />
                  <label for="password">Contraseña</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <input type="password" class="form-control" id="passwordConfirm" placeholder="Confirmar" />
                  <label for="passwordConfirm">Confirmar contraseña</label>
                </div>
              </div>
            </div>

            <div class="form-floating mt-3">
              <select class="form-select" id="rol">
                <option selected disabled value="">Selecciona una opción</option>
                <option>Visitante</option>
                <option>Expositor / Artista</option>
              </select>
              <label for="rol">Tipo de cuenta</label>
            </div>

            <div class="form-check mt-3 mb-4">
              <input class="form-check-input" type="checkbox" id="terminos" />
              <label class="form-check-label small" for="terminos">Acepto los <a href="#" class="text-dark">términos y condiciones</a></label>
            </div>

            <button type="button" class="btn btn-dark w-100 mb-3">Crear cuenta</button>
            <p class="text-center small text-muted mb-0">¿Ya tienes cuenta? <a href="login.html" class="text-dark fw-bold text-decoration-none">Inicia sesión</a></p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-dark text-secondary text-center py-3 mt-auto">
    <small>&copy; 2026 Art Nova Galería</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
